<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>النصوص والتنسيق</title>
</head>
<body>

    <h1>مرحبًا بكم في موقعي</h1>

    <p>
        هذه فقرة تحتوي على كلمة <strong>مهمة</strong>،
        وكلمة <em>مائلة</em>،
        وكلمة <mark>مميزة</mark>.
    </p>

    <small>ملاحظة: هذا مثال بسيط لتنسيق النصوص في HTML.</small>

</body>
</html>
